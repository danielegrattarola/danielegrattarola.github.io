<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>

<!-- SlickNav -->
<script src="{{ '/assets/js/jquery.slicknav.min.js' | relative_url }}"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (window.jQuery && $("#menu").length) {
      $("#menu").slicknav({
        label: "",
        brand: '<a class="brand" href="{{ "/" | relative_url }}">{{ site.navbar_text }}</a>',
      });
    }

    // Defer media loading for below-the-fold content.
    document.querySelectorAll(".entry-content img").forEach(function (img, index) {
      if (!img.hasAttribute("loading")) {
        img.setAttribute("loading", index === 0 ? "eager" : "lazy");
      }
      if (!img.hasAttribute("decoding")) {
        img.setAttribute("decoding", "async");
      }
    });

    document.querySelectorAll(".entry-content iframe").forEach(function (iframe, index) {
      if (!iframe.hasAttribute("loading")) {
        iframe.setAttribute("loading", "lazy");
      }
      if (!iframe.hasAttribute("title")) {
        iframe.setAttribute("title", "Embedded media " + (index + 1));
      }
    });
  });
</script>
