---
layout: main
title: Blog
image: /images/main/oz.jpg
---

<article>
  <h1 class="entry-title">{{page.title}}</h1>

  <div class="content-center">
    <img
      src="{{page.image}}"
      alt="Australian landscape (by Daniele Grattarola)"
      width="1318"
      height="640"
      loading="eager"
      decoding="async"
      class="full-width" />
  </div>
  <br />

  <div class="entry-content">
    {% for post in site.posts %}
    <p>
      <a href="{{post.url}}">{{post.title}}.</a>
      <br />
      <span class="entry-date post-date date published updated">
        <time datetime="{{ post.date | date_to_xmlschema }}">
          <a href="{{ post.url | relative_url }}">{{ post.date | date: "%B %d, %Y" }}</a>
        </time>
        &nbsp;|&nbsp;
      </span>

      <span class="inline-tags">
        {% for tag in post.tags %}
        <a href="/tags/#{{tag}}">#{{ tag }}</a>&nbsp; {% endfor %}
      </span>
    </p>
    {% endfor %}
  </div>
</article>
